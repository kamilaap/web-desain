<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/style_beranda.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <title>Beranda</title>
</head>
<body>

    <nav>
        <div class="nav-logo"></div>
        <div class="nav-links">
            <a href="#" class="nav-link active">Beranda</a>
            <a href="#" class="nav-link">Tentang</a>
            <a href="#" class="nav-link">Elemen</a>
            <a href="#" class="nav-link">Fitur</a>
        </div>
        <div class="nav-search">🔍</div>
        <div class="nav-hamburger">
            <span></span><span></span><span></span>
        </div>
    </nav>

    <section class="hero-section">
        <div class="hero-card">
            <div class="hero-content">
                <h1 class="teks-hijau-cerah">BUMI</h1>
                <h1 class="teks-biru-muda">BERBICARA</h1>
                <p class="teks-redup mt-kecil" style="max-width: 480px;">
                    Eksplorasi tiga elemen fundamental bumi dan krisis yang mengancam keseimbangannya — sebelum terlambat.
                </p>

                <div class="element-grid mt-sedang">
                    <div class="element-box">
                        <img src="../assets/img/elemen-air.png" alt="Elemen Air">
                        <a href="#"></a>
                    </div>
                    <div class="element-box">
                        <img src="../assets/img/elemen-tanah.png" alt="Elemen Tanah">
                        <a href="contact.html"></a>
                    </div>
                    <div class="element-box">
                        <img src="../assets/img/elemen-udara.png" alt="Elemen Udara">
                        <a href="#"></a>
                    </div>
                </div>

                <button class="btn-hijau mt-sedang">Ayo Mulai</button>
            </div>

            <div class="hero-image">
                <video autoplay muted loop playsinline class="hero-video">
        <source src="../assets/video/video-bumi.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
            </div>
        </div>
    </section>

    <script>
        // Script sederhana untuk hamburger menu
        const burger = document.querySelector('.nav-hamburger');
        const links = document.querySelector('.nav-links');
        burger.addEventListener('click', () => {
            burger.classList.toggle('terbuka');
            links.classList.toggle('terbuka');
        });
    </script>
</body>
</html>
